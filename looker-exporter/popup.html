<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Looker Studio Exporter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #0f1117;
      color: #e2e8f0;
    }

    .header {
      padding: 16px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #4285f4, #0f9d58);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f7fafc;
    }

    .header p {
      font-size: 11px;
      color: #718096;
      margin-top: 1px;
    }

    .status-bar {
      padding: 10px 16px;
      background: #161926;
      border-bottom: 1px solid #2d3748;
      font-size: 12px;
      color: #718096;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #statusText { flex: 1; }

    .btn-capture {
      flex: none;
      padding: 3px 8px;
      border: 1px solid #4285f4;
      border-radius: 4px;
      background: transparent;
      color: #4285f4;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-capture:hover { background: rgba(66,133,244,0.12); }
    .btn-capture:disabled { opacity: 0.4; cursor: not-allowed; }

    .capture-bar {
      height: 3px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3748;
    }
    .capture-bar-fill {
      height: 100%;
      background: #4285f4;
      transition: width 0.4s ease;
      width: 0%;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #68d391;
      animation: pulse 2s infinite;
    }

    .status-dot.inactive { background: #4a5568; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chart-list {
      max-height: 280px;
      overflow-y: auto;
      padding: 8px 0;
    }

    .chart-list::-webkit-scrollbar { width: 4px; }
    .chart-list::-webkit-scrollbar-track { background: transparent; }
    .chart-list::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }

    .chart-item {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1a1d27;
      cursor: pointer;
      transition: background 0.1s;
    }

    .chart-item:hover { background: #1a1d27; }

    .chart-item input[type="checkbox"] {
      accent-color: #4285f4;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .chart-info { flex: 1; min-width: 0; }

    .chart-name {
      font-size: 12px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-meta {
      font-size: 11px;
      color: #4a5568;
      margin-top: 2px;
    }

    .fetch-all-link {
      color: #4285f4;
      cursor: pointer;
      margin-left: 4px;
      font-size: 10px;
    }
    .fetch-all-link:hover { text-decoration: underline; }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: #4a5568;
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
    .empty-state p { font-size: 12px; line-height: 1.5; }
    .empty-state .hint { font-size: 11px; color: #2d3748; margin-top: 8px; }

    .actions {
      padding: 12px 16px;
      background: #1a1d27;
      border-top: 1px solid #2d3748;
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #4285f4;
      color: white;
    }

    .btn-primary:hover:not(:disabled) { background: #3b7de8; }

    .btn-secondary {
      background: #2d3748;
      color: #a0aec0;
    }

    .btn-secondary:hover:not(:disabled) { background: #374151; }

    .select-all {
      padding: 8px 16px;
      font-size: 11px;
      color: #4285f4;
      cursor: pointer;
      border-bottom: 1px solid #1a1d27;
      display: flex;
      justify-content: space-between;
    }

    .select-all span { color: #4a5568; }

    .toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d3748;
      color: #e2e8f0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">📊</div>
    <div>
      <h1>Looker Studio Exporter</h1>
      <p>Export chart data as CSV</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot inactive" id="statusDot"></div>
    <span id="statusText">Waiting for report data...</span>
    <button class="btn-capture" id="captureAllBtn" title="Navigate all pages and capture data">All Pages</button>
  </div>
  <div class="capture-bar" id="captureBar" style="display:none">
    <div class="capture-bar-fill" id="captureBarFill"></div>
  </div>

  <div id="selectAllBar" class="select-all" style="display:none">
    <span id="selectAllBtn">Select all</span>
    <span id="chartCount">0 charts</span>
  </div>

  <div class="chart-list" id="chartList">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>No chart data captured yet.</p>
      <p class="hint">Open a Looker Studio report you own,<br>then interact with the page to trigger data loads.</p>
    </div>
  </div>

  <div class="actions">
    <button class="btn-secondary" id="refreshBtn">↻ Refresh</button>
    <button class="btn-secondary" id="clearBtn">Clear</button>
    <button class="btn-primary" id="exportBtn" disabled>Export CSV</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="src/popup.js"></script>
</body>
</html>
